{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    
}

body {
    font-family: 'Poppins', sans-serif;
    background: url("{% static 'image2.jpg' %}") no-repeat center center;
    background-size: cover; 
    background-attachment: fixed;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    text-align: center;
    transition: transform 0.3s ease-in-out;
    width: 100%;
    width: 600px;
    background: white;
    
}


h1 {
    color: black;
    font-size: 32px;
    margin-bottom: 20px;
    position: relative;
}

h1:after {
    content: '';
    width: 50px;
    height: 3px;
    background-color: black;
    display: block;
    margin: 8px auto;
}
    </style>
